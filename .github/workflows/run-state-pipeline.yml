name: Run state pipeline

on:
  workflow_call:
    inputs:
      state_code:
        description: LGD state code from states.csv
        required: true
        type: string
      state_name:
        description: State name from states.csv
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: latest-release-publish
  cancel-in-progress: false

jobs:
  run-state-pipeline:
    name: Run pipeline for ${{ inputs.state_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      PIPELINE_MAX_RUNTIME_SECONDS: "9000"

    steps:
      - name: Set runtime deadline
        run: |
          start_epoch=$(date +%s)
          deadline_epoch=$((start_epoch + PIPELINE_MAX_RUNTIME_SECONDS))
          echo "PIPELINE_STARTED_AT_EPOCH=${start_epoch}" >> "$GITHUB_ENV"
          echo "PIPELINE_DEADLINE_EPOCH=${deadline_epoch}" >> "$GITHUB_ENV"
          echo "Pipeline deadline epoch: ${deadline_epoch}"

      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Check runtime budget before setup
        run: |
          chmod +x .github/scripts/check_runtime_budget.sh
          .github/scripts/check_runtime_budget.sh "setting up the workflow environment"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-suffix: py311-state-pipeline

      - name: Restore geospatial tools cache
        id: restore-tools-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .tooling/bin
            .tooling/src/tippecanoe
          key: geospatial-tools-${{ runner.os }}-tippecanoe-cb6cacef152e649d4500af1f4fa9b4c8f1f98d64-pmtiles-v1.30.2

      - name: Restore state pipeline cache
        id: restore-state-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            raw/search_${{ inputs.state_code }}
            raw/caf_${{ inputs.state_code }}
            raw/parse_cache_${{ inputs.state_code }}
            raw/shape_cache_${{ inputs.state_code }}
            raw/stage_state/${{ inputs.state_code }}.txt
            kml/${{ inputs.state_code }}
            csv
            geojson
            dist
          key: state-data-${{ runner.os }}-${{ inputs.state_code }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            state-data-${{ runner.os }}-${{ inputs.state_code }}-

      - name: Check runtime budget before install
        run: .github/scripts/check_runtime_budget.sh "installing system dependencies"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential curl libsqlite3-dev p7zip-full pkg-config zlib1g-dev

      - name: Prepare stage state
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          chmod +x .github/scripts/stage_state.sh
          stage_file="raw/stage_state/${STATE_CODE}.txt"
          .github/scripts/stage_state.sh init "$stage_file"
          echo "STAGE_FILE=${stage_file}" >> "$GITHUB_ENV"
          echo "Current stage: $(.github/scripts/stage_state.sh get "$stage_file")"

      - name: Check runtime budget before initialize
        run: .github/scripts/check_runtime_budget.sh "initializing state data"

      - name: Initialize state data
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          if .github/scripts/stage_state.sh at-least "$STAGE_FILE" 1; then
            echo "Skipping initialize; stage already complete."
            exit 0
          fi
          bash 1_initialize.sh "$STATE_CODE"
          .github/scripts/stage_state.sh set "$STAGE_FILE" 1

      - name: Check runtime budget before fetch
        run: .github/scripts/check_runtime_budget.sh "fetching state data"

      - name: Fetch state data
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          if .github/scripts/stage_state.sh at-least "$STAGE_FILE" 2; then
            echo "Skipping fetch; stage already complete."
            exit 0
          fi
          bash 2_fetch.sh "$STATE_CODE"
          .github/scripts/stage_state.sh set "$STAGE_FILE" 2

      - name: Check runtime budget before dropping search data
        run: .github/scripts/check_runtime_budget.sh "dropping search data"

      - name: Drop search data
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          rm -rf "raw/search_${STATE_CODE}"

      - name: Check runtime budget before parse
        run: .github/scripts/check_runtime_budget.sh "parsing state data"

      - name: Parse state data
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          if .github/scripts/stage_state.sh at-least "$STAGE_FILE" 3; then
            echo "Skipping parse; stage already complete."
            exit 0
          fi
          uv run --with polars python 3_parse.py "$STATE_CODE"
          .github/scripts/stage_state.sh set "$STAGE_FILE" 3

      - name: Check runtime budget before dropping CAF data
        run: .github/scripts/check_runtime_budget.sh "dropping CAF data"

      - name: Drop CAF data
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          rm -rf "raw/caf_${STATE_CODE}"

      - name: Check runtime budget before dropping parse cache
        run: .github/scripts/check_runtime_budget.sh "dropping parse cache"

      - name: Drop parse cache
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          rm -rf "raw/parse_cache_${STATE_CODE}"

      - name: Check runtime budget before shape build
        run: .github/scripts/check_runtime_budget.sh "building state geometry"

      - name: Build state geometry
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          if .github/scripts/stage_state.sh at-least "$STAGE_FILE" 4; then
            echo "Skipping shape build; stage already complete."
            exit 0
          fi
          uv run 4_make_shape.py "$STATE_CODE"
          .github/scripts/stage_state.sh set "$STAGE_FILE" 4

      - name: Check runtime budget before dropping shape cache
        run: .github/scripts/check_runtime_budget.sh "dropping shape cache"

      - name: Drop shape cache
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          rm -rf "raw/shape_cache_${STATE_CODE}"

      - name: Check runtime budget before geospatial tools
        run: .github/scripts/check_runtime_budget.sh "installing geospatial tools"

      - name: Install geospatial tools
        env:
          PMTILES_VERSION: "1.30.2"
          TIPPECANOE_REF: "cb6cacef152e649d4500af1f4fa9b4c8f1f98d64"
        run: |
          mkdir -p .tooling/bin .tooling/src
          echo "${GITHUB_WORKSPACE}/.tooling/bin" >> "$GITHUB_PATH"

          if [ ! -x .tooling/bin/pmtiles ]; then
            curl -L --silent --show-error \
              "https://github.com/protomaps/go-pmtiles/releases/download/v${PMTILES_VERSION}/go-pmtiles_${PMTILES_VERSION}_Linux_x86_64.tar.gz" \
              -o /tmp/go-pmtiles.tar.gz
            tar -xzf /tmp/go-pmtiles.tar.gz -C .tooling/bin pmtiles
            chmod +x .tooling/bin/pmtiles
          fi

          if [ ! -x .tooling/bin/tippecanoe ] || [ ! -x .tooling/bin/tile-join ]; then
            rm -rf .tooling/src/tippecanoe
            curl -L --silent --show-error \
              "https://github.com/felt/tippecanoe/archive/${TIPPECANOE_REF}.tar.gz" \
              -o /tmp/tippecanoe.tar.gz
            tar -xzf /tmp/tippecanoe.tar.gz -C .tooling/src
            mv ".tooling/src/tippecanoe-${TIPPECANOE_REF}" .tooling/src/tippecanoe
            make -C .tooling/src/tippecanoe -j"$(nproc)"
            cp .tooling/src/tippecanoe/tippecanoe .tooling/bin/
            cp .tooling/src/tippecanoe/tile-join .tooling/bin/
          fi

      - name: Check runtime budget before asset prep
        run: .github/scripts/check_runtime_budget.sh "preparing release assets"

      - name: Prepare release assets
        env:
          GPIO_VERSION: "0.9.0"
          STATE_CODE: ${{ inputs.state_code }}
          STATE_NAME: ${{ inputs.state_name }}
        run: |
          export PATH="${GITHUB_WORKSPACE}/.tooling/bin:${PATH}"
          bash .github/scripts/build_release_assets.sh "$STATE_CODE" "$STATE_NAME"

      - name: Save geospatial tools cache
        if: always() && steps.restore-tools-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            .tooling/bin
            .tooling/src/tippecanoe
          key: geospatial-tools-${{ runner.os }}-tippecanoe-cb6cacef152e649d4500af1f4fa9b4c8f1f98d64-pmtiles-v1.30.2

      - name: Check runtime budget before publish
        run: .github/scripts/check_runtime_budget.sh "publishing release assets"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/publish_state_release.sh
          .github/scripts/publish_state_release.sh \
            "${{ inputs.state_code }}" \
            "${{ inputs.state_name }}" \
            "dist/Projects_${{ inputs.state_code }}.csv.7z" \
            "dist/Projects_${{ inputs.state_code }}.geojsonl.7z" \
            "dist/Projects_${{ inputs.state_code }}.pmtiles" \
            "dist/Projects_${{ inputs.state_code }}.parquet" \
            "dist/Projects_${{ inputs.state_code }}_run.txt"

      - name: Check runtime budget before dropping release artifacts
        run: .github/scripts/check_runtime_budget.sh "dropping release-only artifacts"

      - name: Drop release-only artifacts
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          rm -f \
            "dist/Projects_${STATE_CODE}.csv.7z" \
            "dist/Projects_${STATE_CODE}.geojsonl.7z" \
            "dist/Projects_${STATE_CODE}_run.txt"

      - name: Save state pipeline cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            raw/search_${{ inputs.state_code }}
            raw/caf_${{ inputs.state_code }}
            raw/parse_cache_${{ inputs.state_code }}
            raw/shape_cache_${{ inputs.state_code }}
            raw/stage_state/${{ inputs.state_code }}.txt
            kml/${{ inputs.state_code }}
            csv
            geojson
            dist
          key: state-data-${{ runner.os }}-${{ inputs.state_code }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Cleanup state data
        if: always()
        env:
          STATE_CODE: ${{ inputs.state_code }}
        run: |
          rm -rf \
            "raw/search_${STATE_CODE}" \
            "raw/caf_${STATE_CODE}" \
            "raw/parse_cache_${STATE_CODE}" \
            "raw/shape_cache_${STATE_CODE}" \
            "raw/stage_state/${STATE_CODE}.txt" \
            "kml/${STATE_CODE}"
          rm -f \
            "csv/Projects_${STATE_CODE}.csv" \
            "geojson/Projects_${STATE_CODE}.geojsonl" \
            "dist/Projects_${STATE_CODE}.csv.7z" \
            "dist/Projects_${STATE_CODE}.geojsonl.7z" \
            "dist/Projects_${STATE_CODE}.pmtiles" \
            dist/Projects_${STATE_CODE}-part*.pmtiles \
            "dist/Projects_${STATE_CODE}.mosaic.json" \
            "dist/Projects_${STATE_CODE}.parquet" \
            dist/Projects_${STATE_CODE}.*.parquet \
            "dist/Projects_${STATE_CODE}.parquet.meta.json" \
            "dist/Projects_${STATE_CODE}_run.txt"
